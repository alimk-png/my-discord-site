<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIM'S GVTX | Premium Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #050505;
            --secondary-bg: #0a0a0a;
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --error: #ff3333;
            --success: #00ff88;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .light-theme {
            --primary-bg: #f0f2f5;
            --secondary-bg: #ffffff;
            --accent-color: #000000;
            --text-main: #111111;
            --text-dim: #555555;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
            min-height: 200vh;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 60px 60px;
            perspective: 1000px;
            z-index: -1;
            opacity: 0.5;
        }

        .bg-grid-inner {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent, var(--primary-bg));
            transform: rotateX(45deg);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: rotateX(45deg) translateY(0); }
            100% { transform: rotateX(45deg) translateY(60px); }
        }

        .navbar {
            position: fixed;
            top: 0; width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .nav-actions { display: flex; gap: 15px; }

        .btn-nav {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-nav:hover {
            background: var(--text-main);
            color: var(--primary-bg);
            transform: translateY(-2px);
        }

        .settings-panel {
            position: fixed;
            top: 0; right: -400px;
            width: 350px; height: 100%;
            background: var(--secondary-bg);
            border-left: 1px solid var(--glass-border);
            z-index: 2000;
            padding: 40px 30px;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }

        .settings-panel.open { right: 0; }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .setting-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .copy-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(120, 120, 120, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .btn-copy {
            background: var(--text-main);
            color: var(--primary-bg);
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 900;
        }

        .main-content {
            padding-top: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            text-align: center;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, var(--text-main), var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-join-huge {
            padding: 25px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-color);
            color: var(--primary-bg);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .image-container {
            width: 90%;
            max-width: 1000px;
            height: 500px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            transform: perspective(1000px) rotateX(10deg);
            box-shadow: var(--shadow);
            margin-bottom: 100px;
        }

        .image-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .reg-wrapper {
            width: 100%;
            max-width: 550px;
            background: var(--secondary-bg);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            margin-bottom: 150px;
        }

        .input-block {
            margin-bottom: 30px; 
        }

        .input-block label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* Raqamlar ko'rinishi uchun stil */
        .input-block input, .input-block select {
            width: 100%;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        select option {
            background-color: #1a1a1a !important; /* Qora fon */
            color: white !important; /* Oq raqamlar */
        }

        .input-error {
            border: 1px solid var(--error) !important;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--text-main);
            color: var(--primary-bg);
        }

        #statusBox {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .success-style { background: rgba(0,255,136,0.1); border: 1px solid var(--success); color: var(--success); }

        .footer {
            padding: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="bg-grid"><div class="bg-grid-inner"></div></div>

    <nav class="navbar">
        <div class="logo"><strong>ALIM'S GVTX</strong></div>
        <div class="nav-actions">
            <button class="btn-nav" id="btn-lang" onclick="toggleLang()">RU</button>
            <button class="btn-nav" onclick="toggleSettings()">⚙️</button>
        </div>
    </nav>

    <div class="settings-panel" id="settingsMenu">
        <div class="panel-header" onclick="toggleSettings()">
            <span id="txt-back">← Back</span>
        </div>
        
        <div class="setting-card">
            <h4 id="txt-theme-title">Interface</h4>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;" id="txt-theme-desc">Switch between light and dark modes.</p>
            <button class="btn-submit" onclick="changeTheme()" id="txt-theme-btn">Change Theme</button>
        </div>

        <div class="setting-card">
            <h4 id="txt-ai-title">Neural Network</h4>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px;" id="txt-ai-desc">Redirect to AI Assistant (ChatGPT).</p>
            <button class="btn-submit" onclick="window.open('https://chatgpt.com', '_blank')">AI ASSISTANT</button>
        </div>

        <div class="setting-card">
            <h4 id="txt-support-title">Support</h4>
            <p style="font-size: 0.8rem; color: var(--text-dim);" id="txt-support-desc">If you have problems, contact us:</p>
            <div class="copy-box">
                <span id="supportEmail">cekpetboy@gmail.com</span>
                <button class="btn-copy" onclick="copyEmail()" id="txt-copy">COPY</button>
            </div>
            <button class="btn-submit" style="margin-top: 15px;" onclick="window.location.href='mailto:cekpetboy@gmail.com'" id="txt-write">Write Email</button>
        </div>
    </div>

    <div class="main-content">
        <h1 class="hero-title">ALIM'S<br>GVTX ELITE</h1>
        
        <button class="btn-join-huge" id="btn-join" onclick="handleJoinClick()">Join Server</button>

        <div class="image-container">
            <img src="allo.png" alt="Showcase">
        </div>

        <div class="reg-wrapper" id="regSection">
            <h2 class="form-title" id="txt-reg-title" style="text-align: center; margin-bottom: 30px;">Access Terminal</h2>
            
            <div class="input-block">
                <label id="lbl-name">Full Name (Format: First Last)</label>
                <input type="text" id="inpName" placeholder="Alimov Alim">
            </div>

            <div class="input-block">
                <label id="lbl-email">Secure Email</label>
                <input type="email" id="inpEmail" placeholder="user@domain.com">
            </div>

            <div class="input-block">
                <label id="lbl-date">Birth Date</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <select id="selDay"></select>
                    <select id="selMonth"></select>
                    <select id="selYear"></select>
                </div>
            </div>

            <button class="btn-submit" id="btn-complete" onclick="validateAndRegister()">Complete Registration</button>
            <div id="statusBox"></div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 ALIM'S GVTX. ALL RIGHTS RESERVED.
    </footer>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWC_jYDvWzh241tapSY7LYrI0pS9Dn0tMIZyM14Eje1UXmQoMBHzSD9HNb8v29GPvl/exec';
        const DISCORD_LINK = 'https://discord.gg/CJYXEBp55';

        let currentLang = 'EN';

        const dict = {
            EN: {
                lang: 'RU', back: '← Back', themeTitle: 'Interface', themeDesc: 'Switch light/dark modes.',
                themeBtn: 'Toggle Theme', aiTitle: 'Neural Network', aiDesc: 'Access ChatGPT assistant.',
                supportTitle: 'Support Service', supportDesc: 'If you find an issue, contact us at:',
                copy: 'COPY', write: 'Write Email', join: 'Join Server', regTitle: 'Access Terminal',
                lblName: 'Full Name (Format: First Last)', lblEmail: 'Secure Email', lblDate: 'Birth Date',
                btnComplete: 'Complete Registration', errorName: 'Please enter valid Full Name (Example: Alim Alimov)',
                errorEmail: 'Please enter a valid email address!', success: 'Access Granted! Redirecting to Discord...',
                sending: 'Processing...', needReg: 'Please register first!'
            },
            RU: {
                lang: 'EN', back: '← Назад', themeTitle: 'Интерфейс', themeDesc: 'Переключение темной/светлой темы.',
                themeBtn: 'Сменить тему', aiTitle: 'Нейросеть', aiDesc: 'Перейти к помощнику ChatGPT.',
                supportTitle: 'Служба поддержки', supportDesc: 'Если возникла проблема, напишите нам:',
                copy: 'КОПИЯ', write: 'Написать письмо', join: 'Войти в сервер', regTitle: 'Терминал Доступа',
                lblName: 'Имя и Фамилия (Пример: Alim Alimov)', lblEmail: 'Электронная почта', lblDate: 'Дата рождения',
                btnComplete: 'Завершить регистрацию', errorName: 'Введите имя корректно (Пример: Alim Alimov)',
                errorEmail: 'Введите корректный адрес почты!', success: 'Доступ разрешен! Переходим в Discord...',
                sending: 'Обработка...', needReg: 'Сначала пройдите регистрацию!'
            }
        };

        // Selectlarni to'ldirish (Yil: 2006-2011)
        const d = document.getElementById('selDay');
        const m = document.getElementById('selMonth');
        const y = document.getElementById('selYear');
        for(let i=1; i<=31; i++) d.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=1; i<=12; i++) m.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=2006; i<=2011; i++) y.innerHTML += `<option value="${i}">${i}</option>`;

        function toggleSettings() {
            document.getElementById('settingsMenu').classList.toggle('open');
        }

        function changeTheme() {
            document.body.classList.toggle('light-theme');
        }

        function toggleLang() {
            currentLang = currentLang === 'EN' ? 'RU' : 'EN';
            const t = dict[currentLang];
            document.getElementById('btn-lang').innerText = t.lang;
            document.getElementById('txt-back').innerText = t.back;
            document.getElementById('txt-theme-title').innerText = t.themeTitle;
            document.getElementById('txt-theme-desc').innerText = t.themeDesc;
            document.getElementById('txt-theme-btn').innerText = t.themeBtn;
            document.getElementById('txt-ai-title').innerText = t.aiTitle;
            document.getElementById('txt-ai-desc').innerText = t.aiDesc;
            document.getElementById('txt-support-title').innerText = t.supportTitle;
            document.getElementById('txt-support-desc').innerText = t.supportDesc;
            document.getElementById('txt-copy').innerText = t.copy;
            document.getElementById('txt-write').innerText = t.write;
            document.getElementById('btn-join').innerText = t.join;
            document.getElementById('txt-reg-title').innerText = t.regTitle;
            document.getElementById('lbl-name').innerText = t.lblName;
            document.getElementById('lbl-email').innerText = t.lblEmail;
            document.getElementById('lbl-date').innerText = t.lblDate;
            document.getElementById('btn-complete').innerText = t.btnComplete;
        }

        function copyEmail() {
            const email = document.getElementById('supportEmail').innerText;
            navigator.clipboard.writeText(email);
            const btn = document.getElementById('txt-copy');
            const original = btn.innerText;
            btn.innerText = 'DONE!';
            setTimeout(() => btn.innerText = original, 2000);
        }

        function handleJoinClick() {
            if (localStorage.getItem('isAuth') === 'true') {
                window.location.href = DISCORD_LINK;
            } else {
                document.getElementById('regSection').scrollIntoView({behavior: 'smooth'});
                const box = document.getElementById('statusBox');
                box.style.display = 'block';
                box.style.color = 'var(--error)';
                box.innerText = dict[currentLang].needReg;
            }
        }

        function validateAndRegister() {
            const name = document.getElementById('inpName');
            const email = document.getElementById('inpEmail');
            const day = document.getElementById('selDay').value;
            const month = document.getElementById('selMonth').value;
            const year = document.getElementById('selYear').value;
            const box = document.getElementById('statusBox');
            const btn = document.getElementById('btn-complete');
            const t = dict[currentLang];

            const nameRegex = /^[A-Z][a-z]+ [A-Z][a-z]+$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(!nameRegex.test(name.value)) {
                name.classList.add('input-error');
                box.style.display = 'block';
                box.innerText = t.errorName;
                return;
            } else { name.classList.remove('input-error'); }

            if(!emailRegex.test(email.value)) {
                email.classList.add('input-error');
                box.style.display = 'block';
                box.innerText = t.errorEmail;
                return;
            } else { email.classList.remove('input-error'); }

            btn.innerText = t.sending;
            btn.disabled = true;

            // Ro'yxatdan o'tgan aniq vaqtni olish
            const now = new Date();
            const timestamp = now.toLocaleString();

            const formData = new FormData();
            formData.append('name', name.value);
            formData.append('email', email.value);
            formData.append('birthDate', `${day}/${month}/${year}`);
            formData.append('timestamp', timestamp); // VAQTNI YUBORISH

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).then(() => {
                localStorage.setItem('isAuth', 'true');
                box.className = 'success-style';
                box.style.display = 'block';
                box.innerText = t.success;
                btn.style.display = 'none';
                setTimeout(() => { window.location.href = DISCORD_LINK; }, 2000);
            }).catch(err => {
                btn.disabled = false;
                btn.innerText = t.btnComplete;
                alert("Error connecting to server!");
            });
        }
    </script>
</body>
</html>
